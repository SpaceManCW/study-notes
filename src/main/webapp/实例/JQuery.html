<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>

        h2{padding: 5px}
        p{display: none}
        .c1{
            font-size: 20px;

        }
        .me{
            display: none;
        }
        .first{}
        #l1{
            font-size: 20px;
            color:red;
            font-weight: bold;
        }
        .d1{
            border: black 2px solid;
            width: 400px;
        }
    </style>
</head>
<body>
     <h2>This is a page.</h2>
     <h1>什么是jQuery</h1>
<h3>1.DOM里的节点有三种类型</h3>
<ul>
    <li>元素节点</li>
    <li>文本节点</li>
    <li>属性节点</li>
</ul>
     <h3>2.jQuery语句主要分为三大部分：$()、document、和ready(),分别被称为工厂函数、选择器和方法</h3>
<h3>对象转换</h3>
<ul>
    <li>jQuery对象转化为DOM对象：[index]、get(index)</li>
    <li>DOM对象转化为jQuery对象：$(DOM对象)</li>
</ul>
<h3>技能训练：制作左侧导航特效</h3>
<div class="d1">
    <h1 class="c1">jQuery分类</h1>
    <ul class="me">
        <li id="l1"><a href="#" class="first">jQuery对象</a></li>
        <li id="l1"><a href="#">jQuery方法</a></li>
        <li id="l1"><a href="#">jQuery事件</a></li>
        <li id="l1"><a href="#">jQuery效果</a></li>
    </ul>
</div>
</body>
<script type="text/javascript" src="http://libs.baidu.com/jquery/1.11.3/jquery.min.js"></script>
<script type="text/javascript">
    $(document).ready(function () {
        $("h2").click(function () {
            $("h2").css("background-color", "red").next().css("display", "block");
        });
        $(".c1").click(function (){
            $(".me").css("display","block");
            $(".first").css("background","green");
        })
    });

</script>
</html>
