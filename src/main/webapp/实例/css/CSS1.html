<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        p{
            color:red;
            text-align: center;
        }
        #para1{
            background-color: aqua;
        }
        h4.center{
            text-align: center;
            color: fuchsia;
        }
        .btn-success{
            background-color: chartreuse;
            color: aliceblue;
        }
        h1{
            background-color: aqua;
        }
        #px1{
            font-size: 16px;
            line-height: 2em;
        }
        #px2{
            font-size: 30px;
            border: 1px solid black;
        }
        #em1{
            font-size: 0.5em;
        }
        #indent{
            font-size: 20px;
            text-indent: 2em;
        }
    </style>
    <!--可以指定只有特定元素受class的影响“元素.类名”-->
    <!--可选值有 left | center | right | justify(两端对齐)
    | start | end，默认值为start-->
</head>
<body>
<p id="para1">Every paragraph will be affected by the style</p>
<p>Me too!</p>
<!--id=para1的元素样式由p选择器和 ID选择器层叠决定-->
<h4 class="center">Hello</h4>
<p class="center">This paragraph is.</p>
<button type="button"class="btn btn-success">Success</button>
<!--btn btn-success（18行）定义button全局高宽等基本样式，定义具有特殊意义的button样式-->
<h4 style="color: blue;margin-left: 30px">This is a heading.</h4>
<h1 style="color:orange">Last read style sheet will be used</h1>
<p id="px1">balabalabala</p>
<div id="px2">balabalabala
<span id="em1">balabalabala</span>
</div>
<h1 id="indent">首行缩进2字符长度，与字体实际长度无关</h1>


</body>
</html>
