<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>

        p.round{
            border: 2px solid red;
            border-radius: 12px;
        }
        p.round2{
            border: 2px solid red;
            border-radius: 12px;
            width: 400px;
            margin: auto;
        }
        .d1{
            border: 2px solid black;
            width: 30%;
            height: 20%;
            text-align: center;
            border-radius: 16px;
        }
        .responsive{
            max-width: 100%;
            height: auto;
        }
        /*当窗口尺寸小于图片尺寸时仅随窗口缩小*/
        .responsive2{
            width: 20%;
            height: auto;

        }
        /*无论图片实际尺寸随窗口缩放*/
        div.bg-green{
            background: green;
            padding: 15px;
        }
        div.op1{
            opacity: 0.1;
        }
        div.op2{
            opacity: 0.5;
        }
        div.op3{
            opacity: 0.8;
        }
        div.op4{
            opacity: 1.0;
        }
        div.bg-op1{
            background: rgba(0,255,0,0.1);
            padding: 15px;
        }
        /*rgba 红色，绿色，蓝色，透明度*/
        div.container2>p{
            background: yellow;
        }
        /*  >  子选择器，仅元素内所有符合第二级选择器的，直接子元素*/
        #nth p:nth-child(even){
            background: red;
        }
        #nth p:nth-child(odd){
            background: green;
        }
        /*二级选择器：所有奇数/偶数的p元素 odd奇数*/
        a[target=_blank]{
            background-color: yellow;
        }
        /*显示声明了target属性的a元素*/
        #f1 input[type=password]{
            width: 10%;
            padding: 12px 20px;
            margin: 8px 0;
        }
        button[type=button]{
            background: #4caf50;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class>
    <p class="round" style="text-align: center">Round border</p>
    <p class="round2">This div will be centered beacuse it has margin:auto</p>
    <img src="../resources/images/鬼刀.jpg" alt="演示" class="responsive2">
</div>
<div class="bg-green op1">opacity0.1</div>
<div class="bg-green op2">opacity0.5</div>
<div class="bg-green op3">opacity0.8</div>
<div class="bg-green op4">opacity1.0</div>
<div class="bg-op1">
    <p>仅背景透明，文本显示正常</p>
</div>
<div class="container2">
    <p>balabalabala</p>
    <div>
        <p>balabalabala</p>
    </div>
</div>
<div id="nth">
    <p>The first paragraph.</p>
    <p>The second paragraph.</p>
</div>
<a href="http://www.baidu.com" target="_blank">百度</a>
<form id="f1">
    <label>Password</label>
    <input type="password"><br>
    <button type="button">提交</button>
</form>

</body>
</html>
