<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div.tran1{
            width: 100px;
            height: 100px;
            background: red;

        }
        div.tran1:hover{

            transform: translateY(-2px);
        }
        /*宽度按2秒，高度按4秒*/
        h1.text1{
            text-shadow: 2px 2px;
        }
        h1.text2{
            text-shadow: 2px 2px 5px red;
        }
        h1.text3{
            text-shadow: 0 0 3px #FF0000;
        }
        div.card{
            width: 250px;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2),0 6px 20px 0 rgba(0,0,0,0.19);
            text-align: center;
        }
        div.header{
            background-color: #4caf50;
            color: white;
            padding: 10px;
            font-size: 3em;
            font-weight: bold;
        }
        div.container{
            padding: 10px;
        }
        /*card*/

        .dropdown-1{
            /*容器必须显示声明相对定位，容器中最好仅声明一个悬浮项*/
            position: relative;
            display: inline-block;
        }
        .dropdown-1 .dropdown-menu{
            /*下拉内容不占用空间*/
            display: none;
            /*基于下拉容器的绝对定位*/
            position: absolute;
            background: red;
        }
        /*当悬浮于容器时，显示容器中的下拉项*/
        .dropdown-1:hover .dropdown-menu{
            display: block;
        }

        .dropdown-2{
            position: relative;
            display: inline-block;
        }
        button.dropdown-toggle-2{
            background-color: #4caf50;
            color: white;
            padding: 16px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .dropdown-menu-2{
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        }
        .dropdown-2:hover .dropdown-menu-2{
            display: block;
        }

    </style>
</head>
<body>
<div class="tran1"></div>
<h1 class="text1">Text-shadow effect!</h1>
<h1 class="text2">Text-shadow effect!</h1>
<h1 class="text3">Text-shadow effect!</h1>
<div class="card">
    <div class="header">
        <p>1</p>
    </div>
    <div class="container">
        <p>October,2046</p>
    </div>
</div>
<div class="dropdown-1">
    <span>Mouse over me</span>
    <div class="dropdown-menu">
        <p>Hello World!</p>
    </div>
</div>
<div class="dropdown-2">
    <button class="dropdown-toggle-2">
        Mouse over me
    </button>
    <div class="dropdown-menu-2">
        <ul>
            <li>Link 1</li>
            <li>Link 2</li>
            <li>Link 3</li>
        </ul>
    </div>
</div>
</body>
</html>
