<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
   <style>
       #flex{
           display: flex;
           background-color: #03a9f4;
       }
       #flex>div{
           background: #f1f1f1;
           width: 100px;
           margin: 10px;
           text-align: center;
           line-height: 75px;
           font-size: 30px;
       }
       #flex> .grow1{
           flex-grow: 1;
       }
       #flex> .grow2{
           flex-grow: 2;
       }
       #flex> .percent-30{flex-basis: 30%}
       #flex> .percent-70{flex-basis: 70%}

       .nav ul{
           display: flex;
           padding: 0;
           list-style-type: none;
           background-color: #333;
       }
       /*将ul转为弹性布局，使内部li项变为弹性项，取消内边距，取消li样式*/
       .nav li a{
           display: block;
           color: white;
           padding: 14px 16px;
           text-decoration: none;
       }
       .nav li a:hover{
           background-color: #111;
       }
       .nav .right{
           margin-left: auto;
       }
   </style>
</head>
<body>
<div id="flex">
    <div class="grow1">1</div>
    <div class="grow1">2</div>
    <div class="grow2">3</div>
</div>
<div id="flex">
    <div class="percent-30">30%</div>
    <div class="percent-70">70%</div>
</div>
<div class="nav">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">News</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
        <li class="right"><a href="#">Logout</a></li>
    </ul>
</div>
</body>
</html>
