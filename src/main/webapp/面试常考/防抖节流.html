<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>点击</button>
</body>
</html>
<script>
    var  btn = document.querySelector('button')
    var timer = null
    btn.onclick = function (){
        clearTimeout(timer)
        timer = setTimeout(() => {
            console.log('发送请求了');
        },1000)
    }

    var flag = true
    btn.onclick = function (){
        if(flag) {
            flag = false
            console.log('发送请求了')
            setTimeout(() => {
                flag = true
            },1000)
        }
    }
</script>
