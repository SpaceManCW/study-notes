<script>
    var str = '123abc456def'
    var res = []
    function changeStr(str){
        var arr = str.split("")
        for(let i=0; i<arr.length; i++){
             if(Number(arr[i])>0){
                 res.push(arr[i]*2)
             }else{
                 res.push("["+arr[i]+"]")
             }
        }
        return res.join("")
    }
    console.log(changeStr(str));
</script>
