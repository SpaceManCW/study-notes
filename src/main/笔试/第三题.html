<script>
    var arr = [1,2,0,4,5,0,2,1,0]
    function changeArr(arr){
        var res = []
        for(let i=arr.length-1; i>=0; i--){
            if(arr[i] == 0){
                res.push(arr[i])
            }else{
                res.unshift(arr[i])
            }
        }
        return res
    }
    console.log(changeArr(arr));
</script>
