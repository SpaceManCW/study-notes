<script>
    var arr = [1,1,2,5,5]
    function fun(arr){
        let res = []
        for(let i=0; i<arr.length; i++){
            if(res.indexOf(arr[i]) < 0){
                res.push(arr[i])
            }
        }
        return res
    }
    console.log(fun(arr));
</script>
